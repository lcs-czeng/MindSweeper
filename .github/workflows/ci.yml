name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -project MindSweeper.xcodeproj \
            -scheme MindSweeper \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build

      - name: Test
        run: |
          xcodebuild \
            -project MindSweeper.xcodeproj \
            -scheme MindSweeper \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            test
